# LogDate Server Configuration

# Database Configuration
database {
    # PostgreSQL Configuration (production)
    url = "jdbc:postgresql://localhost:5432/logdate"
    url = ${?DATABASE_URL}
    
    # Database credentials must be provided via DATABASE_USER / DATABASE_PASSWORD (or embedded in
    # DATABASE_URL). Local development needs these set too — the server will refuse to start if a
    # credential is missing. ProductionConfigValidator additionally rejects known-default passwords
    # when LOGDATE_ENV=production.
    user = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
    
    # Connection Pool Settings
    maximumPoolSize = 20
    minimumIdle = 5
    connectionTimeout = 30000
    
    # Development settings
    auto_migrate = true
    auto_migrate = ${?AUTO_MIGRATE}
}

# Server Configuration
server {
    port = 8080
    port = ${?PORT}
    
    host = "0.0.0.0"
    host = ${?HOST}
}

# JWT Configuration
jwt {
    # Must be provided via the JWT_SECRET environment variable in production. Local dev runs
    # without JWT_SECRET will generate an ephemeral per-process secret (tokens invalidate on
    # restart). ProductionConfigValidator refuses to start if this is unset when LOGDATE_ENV=production.
    secret = ${?JWT_SECRET}

    issuer = "logdate.app"
    audience = "logdate-api"
    
    # Token durations in seconds
    access_token_duration = 3600    # 1 hour
    refresh_token_duration = 2592000 # 30 days
    session_token_duration = 900     # 15 minutes
}

# WebAuthn Configuration
webauthn {
    relying_party_id = "logdate.app"
    relying_party_id = ${?WEBAUTHN_RP_ID}
    
    relying_party_name = "LogDate"
    origin = "https://app.logdate.com"
    origin = ${?WEBAUTHN_ORIGIN}
}