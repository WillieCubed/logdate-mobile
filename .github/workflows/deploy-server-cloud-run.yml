name: Deploy Server Cloud Run
run-name: Deploy ${{ inputs.environment }} server from ${{ inputs.deploy-sha }}

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment configured in GitHub Environments and Terraform tfvars.
        required: true
        type: string
      deploy-sha:
        description: Commit SHA to deploy.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }} revision
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_SHA: ${{ inputs.deploy-sha }}
      ENVIRONMENT: ${{ inputs.environment }}
      REPO_PROJECT_ID: ${{ vars.LOGDATE_PROJECT_ID }}
      REPO_REGION: ${{ vars.LOGDATE_REGION }}
      REPO_SERVICE_NAME: ${{ vars.LOGDATE_SERVICE_NAME }}
      REPO_DOMAIN: ${{ vars.LOGDATE_DOMAIN }}
      REPO_ARTIFACT_REGISTRY_REPO: ${{ vars.LOGDATE_ARTIFACT_REGISTRY_REPO }}
      REPO_RUNTIME_SERVICE_ACCOUNT: ${{ vars.LOGDATE_RUNTIME_SERVICE_ACCOUNT }}
      REPO_DEPLOY_SOURCE: ${{ vars.LOGDATE_DEPLOY_SOURCE }}

    steps:
      - name: Check out deployment commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Load deployment configuration
        run: |
          TF_DIR="infra/terraform"
          TFVARS_FILE="${TF_DIR}/${ENVIRONMENT}.tfvars"
          if [[ "${REPO_DEPLOY_SOURCE}" == "repo_vars" ]]; then
            PROJECT_ID="${REPO_PROJECT_ID}"
            REGION="${REPO_REGION}"
            SERVICE_NAME="${REPO_SERVICE_NAME}"
            DOMAIN="${REPO_DOMAIN}"
            ARTIFACT_REGISTRY_REPO="${REPO_ARTIFACT_REGISTRY_REPO}"
            RUNTIME_SERVICE_ACCOUNT_EMAIL="${REPO_RUNTIME_SERVICE_ACCOUNT}"

            echo "Using repository deployment variables because LOGDATE_DEPLOY_SOURCE=repo_vars."
          elif [[ -f "$TFVARS_FILE" ]]; then
            terraform -chdir="$TF_DIR" init -backend=false -input=false
            TFVARS_BASENAME="$(basename "$TFVARS_FILE")"

            tf_value() {
              local value
              value=$(printf 'var.%s\n' "$1" | terraform -chdir="$TF_DIR" console -var-file="$TFVARS_BASENAME" 2>/dev/null | sed -e 's/^> //' | sed '/^$/d' | tail -n 1)
              value="${value%\"}"
              value="${value#\"}"
              if [[ "$value" == "null" ]]; then
                value=""
              fi
              echo "$value"
            }

            PROJECT_ID=$(tf_value project_id)
            REGION=$(tf_value region)
            SERVICE_NAME=$(tf_value service_name)
            DOMAIN=$(tf_value domain)
            ARTIFACT_REGISTRY_REPO=$(tf_value artifact_registry_repo)
            RUNTIME_SERVICE_ACCOUNT_NAME=$(tf_value runtime_service_account_name)

            if [[ -n "$RUNTIME_SERVICE_ACCOUNT_NAME" && -n "$PROJECT_ID" ]]; then
              RUNTIME_SERVICE_ACCOUNT_EMAIL="${RUNTIME_SERVICE_ACCOUNT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com"
            else
              RUNTIME_SERVICE_ACCOUNT_EMAIL=""
            fi

            echo "Using tfvars configuration from $TFVARS_FILE"
          else
            PROJECT_ID="${REPO_PROJECT_ID}"
            REGION="${REPO_REGION}"
            SERVICE_NAME="${REPO_SERVICE_NAME}"
            DOMAIN="${REPO_DOMAIN}"
            ARTIFACT_REGISTRY_REPO="${REPO_ARTIFACT_REGISTRY_REPO}"
            RUNTIME_SERVICE_ACCOUNT_EMAIL="${REPO_RUNTIME_SERVICE_ACCOUNT}"

            echo "Using repository deployment variables because $TFVARS_FILE is not present."
          fi

          {
            echo "TFVARS_FILE=$TFVARS_FILE"
            echo "PROJECT_ID=$PROJECT_ID"
            echo "REGION=$REGION"
            echo "SERVICE_NAME=$SERVICE_NAME"
            echo "DOMAIN=$DOMAIN"
            echo "ARTIFACT_REGISTRY_REPO=$ARTIFACT_REGISTRY_REPO"
            echo "RUNTIME_SERVICE_ACCOUNT=$RUNTIME_SERVICE_ACCOUNT_EMAIL"
          } >> "$GITHUB_ENV"

      - name: Validate deployment configuration
        run: |
          if [[ -z "${SERVICE_NAME}" || -z "${PROJECT_ID}" || -z "${REGION}" ]]; then
            echo "SERVICE_NAME, PROJECT_ID, and REGION must be set in infra/terraform/${ENVIRONMENT}.tfvars or repository variables."
            exit 1
          fi
          if [[ "${PROJECT_ID}" == *"Terraform exited with code"* || "${REGION}" == *"Terraform exited with code"* ]]; then
            echo "SERVICE_NAME, PROJECT_ID, and REGION must be set in infra/terraform/${ENVIRONMENT}.tfvars or repository variables."
            exit 1
          fi
          if [[ -z "${DOMAIN}" ]]; then
            echo "DOMAIN is not set; custom domain verification will be skipped."
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          target: production
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ env.DEPLOY_SHA }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest
          cache-from: |
            type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache
            type=gha,scope=${{ env.SERVICE_NAME }}-image
          cache-to: |
            type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache,mode=max
            type=gha,mode=max,scope=${{ env.SERVICE_NAME }}-image

      - name: Run database migrations
        run: |
          ./scripts/run-migrations.sh \
            --project-id "${PROJECT_ID}" \
            --region "${REGION}" \
            --validate-passkey-fk

      - name: Configure candidate tag
        run: echo "CANDIDATE_TAG=c-${DEPLOY_SHA:0:12}" >> "$GITHUB_ENV"

      - name: Deploy candidate revision without traffic
        run: |
          service_account_args=()
          if [[ -n "${RUNTIME_SERVICE_ACCOUNT}" ]]; then
            service_account_args=(--service-account "${RUNTIME_SERVICE_ACCOUNT}")
          fi

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ env.DEPLOY_SHA }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --no-traffic \
            --tag "$CANDIDATE_TAG" \
            --set-env-vars "RELEASE_VERSION=logdate-server@${{ env.DEPLOY_SHA }}" \
            "${service_account_args[@]}"

          REVISION_URL=""
          for _ in $(seq 1 30); do
            REVISION_URL=$(
              gcloud run services describe ${{ env.SERVICE_NAME }} \
                --platform managed --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
                --format=json |
                jq -r --arg tag "$CANDIDATE_TAG" '.status.traffic[]? | select(.tag == $tag) | .url // empty'
            )
            if [[ -n "$REVISION_URL" ]]; then
              break
            fi
            sleep 2
          done
          if [[ -z "$REVISION_URL" ]]; then
            echo "Timed out waiting for candidate revision URL for tag ${CANDIDATE_TAG}."
            gcloud run services describe ${{ env.SERVICE_NAME }} \
              --platform managed --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
              --format="yaml(status.traffic)"
            exit 1
          fi
          echo "REVISION_URL=$REVISION_URL" >> "$GITHUB_ENV"

      - name: Smoke test candidate revision
        run: ./scripts/smoke-test-revision.sh "$REVISION_URL"

      - name: Promote candidate to 100 percent traffic
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --to-tags "$CANDIDATE_TAG=100"

      - name: Verify deployed service
        run: |
          wait_for_health() {
            local url="$1"
            local attempts="$2"
            local sleep_seconds="$3"

            for _ in $(seq 1 "$attempts"); do
              if curl -sf --max-time 10 "$url/health" >/dev/null; then
                return 0
              fi
              sleep "$sleep_seconds"
            done

            return 1
          }

          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')

          echo "Cloud Run URL: $SERVICE_URL"
          if [[ -n "${DOMAIN}" ]]; then
            echo "Custom Domain: https://${{ env.DOMAIN }}"
          fi

          echo "Checking health on Cloud Run URL..."
          wait_for_health "$SERVICE_URL" 30 2 || exit 1

          if [[ -n "${DOMAIN}" ]]; then
            echo "Checking custom domain (may take 15-30 min for SSL)..."
            if wait_for_health "https://${{ env.DOMAIN }}" 10 3; then
              echo "Custom domain is working."
            else
              echo "Custom domain not yet responding; SSL may still be provisioning."
            fi
          fi
