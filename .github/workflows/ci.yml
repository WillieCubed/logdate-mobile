name: CI
run-name: CI for ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: logdate_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Materialize Firebase config
        uses: ./.github/actions/setup-firebase-configs
        with:
          android-google-services-json-base64: ${{ secrets.LOGDATE_ANDROID_GOOGLE_SERVICES_JSON_DEBUG_BASE64 }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run tests
        run: ./gradlew test --continue
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/logdate_test
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          REDIS_URL: redis://localhost:6379

      - name: Generate coverage report
        run: ./gradlew koverXmlReport
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./build/reports/kover/report.xml
          fail_ci_if_error: false

  e2e-tests:
    name: Server / client e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: logdate
          POSTGRES_PASSWORD: logdate
          POSTGRES_DB: logdate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Run e2e tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/logdate
          DATABASE_USER: logdate
          DATABASE_PASSWORD: logdate
        run: ./gradlew :integration:server-client-e2e:test --no-daemon --continue
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-reports
          path: integration/server-client-e2e/build/reports/tests

  lint:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Materialize Firebase config
        uses: ./.github/actions/setup-firebase-configs
        with:
          android-google-services-json-base64: ${{ secrets.LOGDATE_ANDROID_GOOGLE_SERVICES_JSON_DEBUG_BASE64 }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check hardcoded Compose literals
        run: ./scripts/check_hardcoded_compose_literals.sh

      - name: Run lint
        run: ./gradlew lint

  build:
    name: Server artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build server
        run: ./gradlew :server:build -x test

      - name: Upload server artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-jar
          path: server/build/libs/logdate-server.jar
          retention-days: 7
