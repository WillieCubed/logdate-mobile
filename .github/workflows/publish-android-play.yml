name: Publish Android to Play

on:
  push:
    branches: [main]
    tags:
      - 'android-v*'
  workflow_dispatch:

concurrency:
  group: android-play-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-internal:
    if: ${{ vars.LOGDATE_PLAY_INTERNAL_PUBLISH_ENABLED == 'true' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PLAY_TRACK: internal
      ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.ANDROID_PUBLISHER_CREDENTIALS }}
      LOGDATE_RELEASE_STORE_BASE64: ${{ secrets.LOGDATE_RELEASE_STORE_BASE64 }}
      LOGDATE_RELEASE_STORE_PASSWORD: ${{ secrets.LOGDATE_RELEASE_STORE_PASSWORD }}
      LOGDATE_RELEASE_KEY_ALIAS: ${{ secrets.LOGDATE_RELEASE_KEY_ALIAS }}
      LOGDATE_RELEASE_KEY_PASSWORD: ${{ secrets.LOGDATE_RELEASE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-firebase-configs
        with:
          android-google-services-json-base64: ${{ secrets.LOGDATE_ANDROID_GOOGLE_SERVICES_JSON_RELEASE_BASE64 }}
          android-flavor: release

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Resolve Android version
        id: version
        shell: bash
        run: ./scripts/resolve-android-play-version.sh

      - name: Prepare Play publish inputs
        id: prepare
        shell: bash
        run: ./scripts/prepare-android-play-publishing.sh internal

      - name: Publish release bundle to Play internal track
        run: >
          ./gradlew :app:android-main:publishReleaseBundle
          --release-name "${{ steps.version.outputs.internal_release_name }}"
        env:
          LOGDATE_PLAY_TRACK: ${{ env.PLAY_TRACK }}
          LOGDATE_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          LOGDATE_VERSION_NAME: ${{ steps.version.outputs.version_name }}

      - name: Upload release bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-bundle-${{ env.PLAY_TRACK }}-${{ github.sha }}
          path: app/android-main/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean up release files
        if: always()
        shell: bash
        run: |
          if [[ -n "${{ steps.prepare.outputs.keystore_path }}" ]]; then
            rm -f "${{ steps.prepare.outputs.keystore_path }}"
          fi
          rm -f app/android-main/src/release/google-services.json

  publish-production:
    if: ${{ vars.LOGDATE_PLAY_PRODUCTION_PUBLISH_ENABLED == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/android-v') }}
    environment: android-production
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.ANDROID_PUBLISHER_CREDENTIALS }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Resolve Android version
        id: version
        shell: bash
        run: ./scripts/resolve-android-play-version.sh

      - name: Validate Play credentials
        shell: bash
        run: ./scripts/prepare-android-play-publishing.sh production

      - name: Promote tested internal release to Play production
        run: >
          ./gradlew :app:android-main:promoteReleaseArtifact
          --from-track internal
          --promote-track production
          --version-code "${{ steps.version.outputs.version_code }}"
          --release-name "${{ steps.version.outputs.production_release_name }}"
          --release-status completed

      - name: Draft GitHub Release for android-v* tag
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            --title "Android ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})"
