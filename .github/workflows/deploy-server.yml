name: Deploy Server

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-tag smoke gate: a tag push (which would otherwise deploy straight to
  # prod) first has to prove the same code is healthy in staging. Hits
  # cloud-staging.logdate.app/health with the staging health token to confirm
  # the database is actually reachable, then runs the end-to-end passkey
  # simulator so we catch broken signup/signin before they reach prod. Skipped
  # for workflow_run (auto-deploy of main to staging — there's nothing to gate
  # against yet) and workflow_dispatch (operator override).
  smoke:
    name: Pre-tag staging smoke test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify staging /health includes db_connected
        env:
          HEALTH_TOKEN: ${{ secrets.HEALTH_INTERNAL_TOKEN_STAGING }}
        run: |
          if [[ -z "$HEALTH_TOKEN" ]]; then
            echo "::error::HEALTH_INTERNAL_TOKEN_STAGING repo secret is unset; cannot gate prod tag deploys without it."
            exit 1
          fi
          response=$(curl -sS -f --max-time 10 \
            -H "X-LogDate-Health-Token: $HEALTH_TOKEN" \
            https://cloud-staging.logdate.app/health)
          echo "$response"
          # jq -e exits non-zero if the expression is false/null.
          echo "$response" | jq -e '.db_connected == true' >/dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run end-to-end passkey simulator against staging
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet fido2 requests
          .venv/bin/python scripts/passkey-verify/sim.py --base https://cloud-staging.logdate.app

  deploy:
    needs: [smoke]
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() && (
          (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.smoke.result == 'success') ||
          (github.event_name == 'workflow_dispatch' && (
            inputs.environment == 'staging' ||
            (inputs.environment == 'production' && startsWith(github.ref, 'refs/tags/'))
          ))
        )
      }}
    environment: >-
      ${{
        github.event_name == 'workflow_dispatch' && inputs.environment ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) && 'production' ||
        'staging'
      }}
    env:
      ENVIRONMENT: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.environment ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) && 'production' ||
          'staging'
        }}
      REPO_PROJECT_ID: ${{ vars.LOGDATE_PROJECT_ID }}
      REPO_REGION: ${{ vars.LOGDATE_REGION }}
      REPO_SERVICE_NAME: ${{ vars.LOGDATE_SERVICE_NAME }}
      REPO_DOMAIN: ${{ vars.LOGDATE_DOMAIN }}
      REPO_ARTIFACT_REGISTRY_REPO: ${{ vars.LOGDATE_ARTIFACT_REGISTRY_REPO }}
      REPO_RUNTIME_SERVICE_ACCOUNT: ${{ vars.LOGDATE_RUNTIME_SERVICE_ACCOUNT }}
      REPO_DEPLOY_SOURCE: ${{ vars.LOGDATE_DEPLOY_SOURCE }}

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Load environment config
        run: |
          TF_DIR="infra/terraform"
          TFVARS_FILE="${TF_DIR}/${ENVIRONMENT}.tfvars"
          if [[ "${REPO_DEPLOY_SOURCE}" == "repo_vars" ]]; then
            PROJECT_ID="${REPO_PROJECT_ID}"
            REGION="${REPO_REGION}"
            SERVICE_NAME="${REPO_SERVICE_NAME}"
            DOMAIN="${REPO_DOMAIN}"
            ARTIFACT_REGISTRY_REPO="${REPO_ARTIFACT_REGISTRY_REPO}"
            RUNTIME_SERVICE_ACCOUNT_EMAIL="${REPO_RUNTIME_SERVICE_ACCOUNT}"

            echo "Using repository deployment variables because LOGDATE_DEPLOY_SOURCE=repo_vars."
          elif [[ -f "$TFVARS_FILE" ]]; then
            terraform -chdir="$TF_DIR" init -backend=false -input=false
            # `terraform -chdir=X -var-file=Y` resolves Y relative to X. The workflow-level
            # $TFVARS_FILE is a path from the workspace root, so pass the basename here so
            # it isn't double-prefixed (which produced the
            # "Failed to read variables file" error and turned every var into the literal
            # string "::error::Terraform exited with code 1.").
            TFVARS_BASENAME="$(basename "$TFVARS_FILE")"

            tf_value() {
              local value
              value=$(printf 'var.%s\n' "$1" | terraform -chdir="$TF_DIR" console -var-file="$TFVARS_BASENAME" 2>/dev/null | sed -e 's/^> //' | sed '/^$/d' | tail -n 1)
              value="${value%\"}"
              value="${value#\"}"
              if [[ "$value" == "null" ]]; then
                value=""
              fi
              echo "$value"
            }

            PROJECT_ID=$(tf_value project_id)
            REGION=$(tf_value region)
            SERVICE_NAME=$(tf_value service_name)
            DOMAIN=$(tf_value domain)
            ARTIFACT_REGISTRY_REPO=$(tf_value artifact_registry_repo)
            RUNTIME_SERVICE_ACCOUNT_NAME=$(tf_value runtime_service_account_name)

            if [[ -n "$RUNTIME_SERVICE_ACCOUNT_NAME" && -n "$PROJECT_ID" ]]; then
              RUNTIME_SERVICE_ACCOUNT_EMAIL="${RUNTIME_SERVICE_ACCOUNT_NAME}@${PROJECT_ID}.iam.gserviceaccount.com"
            else
              RUNTIME_SERVICE_ACCOUNT_EMAIL=""
            fi

            echo "Using tfvars configuration from $TFVARS_FILE"
          else
            PROJECT_ID="${REPO_PROJECT_ID}"
            REGION="${REPO_REGION}"
            SERVICE_NAME="${REPO_SERVICE_NAME}"
            DOMAIN="${REPO_DOMAIN}"
            ARTIFACT_REGISTRY_REPO="${REPO_ARTIFACT_REGISTRY_REPO}"
            RUNTIME_SERVICE_ACCOUNT_EMAIL="${REPO_RUNTIME_SERVICE_ACCOUNT}"

            echo "Using repository deployment variables because $TFVARS_FILE is not present."
          fi

          echo "TFVARS_FILE=$TFVARS_FILE" >> "$GITHUB_ENV"
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "REGION=$REGION" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=$SERVICE_NAME" >> "$GITHUB_ENV"
          echo "DOMAIN=$DOMAIN" >> "$GITHUB_ENV"
          echo "ARTIFACT_REGISTRY_REPO=$ARTIFACT_REGISTRY_REPO" >> "$GITHUB_ENV"
          echo "RUNTIME_SERVICE_ACCOUNT=$RUNTIME_SERVICE_ACCOUNT_EMAIL" >> "$GITHUB_ENV"

      - name: Validate deployment configuration
        run: |
          if [[ -z "${SERVICE_NAME}" || -z "${PROJECT_ID}" || -z "${REGION}" ]]; then
            echo "SERVICE_NAME, PROJECT_ID, and REGION must be set in infra/terraform/${ENVIRONMENT}.tfvars or repository variables."
            exit 1
          fi
          # Catch the case where Terraform's actionlint wrapper turned an error into the variable value.
          if [[ "${PROJECT_ID}" == *"Terraform exited with code"* || "${REGION}" == *"Terraform exited with code"* ]]; then
            echo "SERVICE_NAME, PROJECT_ID, and REGION must be set in infra/terraform/${ENVIRONMENT}.tfvars or repository variables."
            exit 1
          fi
          if [[ -z "${DOMAIN}" ]]; then
            echo "DOMAIN is not set; custom domain verification will be skipped."
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Configure runtime service account
        run: |
          if [[ -n "${RUNTIME_SERVICE_ACCOUNT}" ]]; then
            echo "SERVICE_ACCOUNT_FLAG=--service-account ${RUNTIME_SERVICE_ACCOUNT}" >> "$GITHUB_ENV"
          else
            echo "SERVICE_ACCOUNT_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: production
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ env.DEPLOY_SHA }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest
          cache-from: |
            type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:buildcache,mode=max
            type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ env.DEPLOY_SHA }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            $SERVICE_ACCOUNT_FLAG

      - name: Verify deployment
        run: |
          wait_for_health() {
            local url="$1"
            local attempts="$2"
            local sleep_seconds="$3"

            for _ in $(seq 1 "$attempts"); do
              if curl -sf --max-time 10 "$url/health" >/dev/null; then
                return 0
              fi
              sleep "$sleep_seconds"
            done

            return 1
          }

          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')

          echo "Cloud Run URL: $SERVICE_URL"
          if [[ -n "${DOMAIN}" ]]; then
            echo "Custom Domain: https://${{ env.DOMAIN }}"
          fi

          # Health check on Cloud Run URL
          echo "Checking health on Cloud Run URL..."
          wait_for_health "$SERVICE_URL" 30 2 || exit 1

          # Check custom domain (may fail initially while SSL provisions)
          if [[ -n "${DOMAIN}" ]]; then
            echo "Checking custom domain (may take 15-30 min for SSL)..."
            if wait_for_health "https://${{ env.DOMAIN }}" 10 3; then
              echo "Custom domain is working!"
            else
              echo "Custom domain not yet responding - SSL may still be provisioning"
              echo "This is expected for new domain mappings. Check again in 15-30 minutes."
            fi
          fi
