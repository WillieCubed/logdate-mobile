name: Deploy Server Staging
run-name: Deploy staging server from ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-server-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy staging revision
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}
    uses: ./.github/workflows/deploy-server-cloud-run.yml
    with:
      environment: staging
      deploy-sha: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    secrets: inherit
