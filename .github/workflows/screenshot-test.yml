name: Screenshot Tests
run-name: Screenshot tests for ${{ github.ref_name }} by ${{ github.actor }}

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/android-main/**'
      - 'app/wear/**'
      - 'app/compose-main/**'
      - 'client/feature/**'
      - 'client/ui/**'
      - 'client/theme/**'
      - '.github/workflows/screenshot-test.yml'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'

permissions:
  contents: read

jobs:
  android-wear-screenshots:
    name: Android and Wear screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Materialize Android Firebase config
        uses: ./.github/actions/setup-firebase-configs
        with:
          android-google-services-json-base64: ${{ secrets.LOGDATE_ANDROID_GOOGLE_SERVICES_JSON_DEBUG_BASE64 }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Android and Wear screenshots
        run: ./gradlew validateAndroidScreenshots --continue

      - name: Upload Android and Wear screenshot reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-wear-screenshot-report
          path: |
            app/android-main/build/outputs/screenshotTest-results/
            app/wear/build/outputs/screenshotTest-results/
          retention-days: 14

  desktop-screenshots:
    name: Desktop screenshots
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Desktop screenshots
        run: ./gradlew validateDesktopScreenshots --continue

      - name: Upload Desktop screenshot reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-screenshot-report
          path: app/compose-main/build/reports/desktopScreenshotTest/
          retention-days: 14

  ios-screenshot-validation:
    name: iOS screenshot lane
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Materialize mobile Firebase configs
        uses: ./.github/actions/setup-firebase-configs
        with:
          android-google-services-json-base64: ${{ secrets.LOGDATE_ANDROID_GOOGLE_SERVICES_JSON_DEBUG_BASE64 }}
          ios-google-service-info-plist-base64: ${{ secrets.LOGDATE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate iOS screenshot lane
        run: ./gradlew validateIosScreenshots --continue

      - name: Upload iOS screenshot reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-screenshot-report
          path: app/compose-main/build/reports/tests/
          retention-days: 14
