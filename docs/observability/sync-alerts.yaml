groups:
  - name: logdate-sync
    rules:
      - alert: LogDateSyncHighErrorRate
        expr: |
          (sum(rate(logdate_sync_operation_error_total[5m]))
          /
          (sum(rate(logdate_sync_operation_success_total[5m]))
          + sum(rate(logdate_sync_operation_error_total[5m])))) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Sync error rate above 5%"
          description: "Sync operations error rate exceeded 5% over the last 10 minutes."

      - alert: LogDateSyncHighLatency
        expr: |
          (sum(rate(logdate_sync_operation_duration_ms_total[5m]))
          /
          (sum(rate(logdate_sync_operation_success_total[5m]))
          + sum(rate(logdate_sync_operation_error_total[5m])))) > 2000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Average sync latency above 2s"
          description: "Average sync operation latency exceeded 2000ms over the last 10 minutes."

      - alert: LogDateSyncConflictSpike
        expr: rate(logdate_sync_conflicts_total[5m]) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Sync conflicts spiking"
          description: "Sync conflicts are arriving faster than 1/min for 10 minutes."

      - alert: LogDateSyncPurgeFailures
        expr: |
          sum(rate(logdate_sync_operation_error_total{operation="sync.maintenance.purge"}[15m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Sync tombstone purge failing"
          description: "Background tombstone purge has reported errors in the last 15 minutes."
